<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OblivionX</title>

<style>
:root{
    --accent:#8C5AFF;
    --bg:#050505;
    --panel:#0B0B0D;
    --border:rgba(255,255,255,.08);
    --text:#fff;
    --dim:#777;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body,html{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:white;
}

/* =========================================
    WEATHER CANVAS
========================================= */

#weather{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:.35;
}

/* =========================================
    APP
========================================= */

.app{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(10px);
}

/* =========================================
    TOP BAR
========================================= */

.topbar{
    height:42px;
    background:rgba(0,0,0,.55);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 14px;
    -webkit-app-region:drag;
}

.logo{
    font-size:11px;
    letter-spacing:3px;
    font-weight:700;
    color:#aaa;
}

.logo span{
    color:var(--accent);
}

.window-controls{
    display:flex;
    gap:8px;
    -webkit-app-region:no-drag;
}

.win-btn{
    width:30px;
    height:30px;
    border:none;
    border-radius:8px;
    background:transparent;
    color:#aaa;
    cursor:pointer;
    transition:.2s;
}

.win-btn:hover{
    background:rgba(255,255,255,.06);
    color:white;
}

.close-btn:hover{
    background:#ff3b30;
    color:white;
}

/* =========================================
    HEADER
========================================= */

.header{
    height:52px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;
    background:rgba(0,0,0,.35);
    border-bottom:1px solid var(--border);
}

.inject-status{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:11px;
    color:#aaa;
}

.dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#444;
    transition:.3s;
}

.dot.attached{
    background:var(--accent);
    box-shadow:0 0 12px var(--accent);
}

/* =========================================
    BUTTONS
========================================= */

.btns{
    display:flex;
    gap:10px;
}

.btn{
    background:#0F0F12;
    border:1px solid var(--border);
    color:white;
    padding:8px 14px;
    border-radius:10px;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    border-color:var(--accent);
    transform:translateY(-1px);
}

/* =========================================
    EDITOR
========================================= */

#editor{
    flex:1;
}

/* =========================================
    NOTIFICATIONS
========================================= */

.notifications{
    position:fixed;
    top:60px;
    right:20px;
    z-index:9999;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.toast{
    min-width:260px;
    background:rgba(10,10,12,.95);
    border:1px solid var(--border);
    border-left:4px solid var(--accent);
    padding:14px;
    border-radius:12px;
    animation:slide .3s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.toast-title{
    font-size:12px;
    font-weight:700;
    margin-bottom:4px;
}

.toast-msg{
    font-size:11px;
    color:#aaa;
}

@keyframes slide{
    from{
        opacity:0;
        transform:translateX(40px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}
</style>
</head>

<body>

<canvas id="weather"></canvas>

<div class="notifications" id="notifications"></div>

<div class="app">

    <!-- TOP BAR -->

    <div class="topbar">

        <div class="logo">
            OBLIVION<span>X</span>
        </div>

        <div class="window-controls">

            <button
                class="win-btn"
                onclick="minimizeWindow()"
            >
                —
            </button>

            <button
                class="win-btn close-btn"
                onclick="closeWindow()"
            >
                ×
            </button>

        </div>

    </div>

    <!-- HEADER -->

    <div class="header">

        <div class="inject-status">

            <div id="inject-dot" class="dot"></div>

            <span id="inject-text">
                Not Attached
            </span>

        </div>

        <div class="btns">

            <button
                class="btn"
                onclick="inject()"
            >
                Inject
            </button>

            <button
                class="btn"
                onclick="executeScript()"
            >
                Execute
            </button>

        </div>

    </div>

    <div id="editor"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

<script>

/* =========================================
    MONACO
========================================= */

let editor;

require.config({
    paths:{
        vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
    }
});

require(['vs/editor/editor.main'], function(){

    editor = monaco.editor.create(
        document.getElementById('editor'),
        {
            value:
`print("OblivionX Loaded")`,
            language:'lua',
            theme:'vs-dark',
            automaticLayout:true,
            minimap:{enabled:false},
            fontSize:13,
            smoothScrolling:true
        }
    );
});

/* =========================================
    WINDOW CONTROLS
========================================= */

function minimizeWindow(){
    window.chrome.webview.postMessage({
        action:'minimize'
    });
}

function closeWindow(){
    window.chrome.webview.postMessage({
        action:'exit'
    });
}

/* =========================================
    EXECUTOR
========================================= */

function inject(){

    notify(
        "Injector",
        "Attempting injection..."
    );

    window.chrome.webview.postMessage({
        action:'inject'
    });
}

function executeScript(){

    if(!editor) return;

    window.chrome.webview.postMessage({
        action:'execute',
        code:editor.getValue()
    });

    notify(
        "Execution",
        "Script sent to executor."
    );
}

/* =========================================
    STATUS
========================================= */

function setAttached(state){

    const dot =
        document.getElementById('inject-dot');

    const text =
        document.getElementById('inject-text');

    if(state){

        dot.classList.add('attached');

        text.innerText =
            'Injected';

    }else{

        dot.classList.remove('attached');

        text.innerText =
            'Not Attached';
    }
}

/* =========================================
    NOTIFICATIONS
========================================= */

function notify(title,msg){

    const holder =
        document.getElementById(
            'notifications'
        );

    const toast =
        document.createElement('div');

    toast.className = 'toast';

    toast.innerHTML =
`
<div class="toast-title">
${title}
</div>

<div class="toast-msg">
${msg}
</div>
`;

    holder.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3500);
}

/* =========================================
    WEBVIEW EVENTS
========================================= */

window.chrome.webview.addEventListener(
    'message',
    event => {

        const msg = event.data;

        if(msg.action === 'console'){

            notify(
                msg.type.toUpperCase(),
                msg.message
            );

            if(
                msg.message
                    .toLowerCase()
                    .includes('inject')
            ){
                setAttached(true);
            }
        }

        if(
            msg.action === 'clear_pid'
        ){
            setAttached(false);
        }
    }
);

/* =========================================
    WEATHER ENGINE
========================================= */

const canvas =
    document.getElementById('weather');

const ctx =
    canvas.getContext('2d');

function resize(){

    canvas.width =
        window.innerWidth;

    canvas.height =
        window.innerHeight;
}

window.addEventListener(
    'resize',
    resize
);

resize();

const rain = [];

for(let i=0;i<180;i++){

    rain.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        l:Math.random()*20,
        s:4+Math.random()*6

    });
}

function animate(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.strokeStyle =
        'rgba(140,90,255,.35)';

    ctx.lineWidth = 1;

    rain.forEach(r=>{

        ctx.beginPath();

        ctx.moveTo(r.x,r.y);

        ctx.lineTo(
            r.x+2,
            r.y+r.l
        );

        ctx.stroke();

        r.y += r.s;
        r.x += 0.5;

        if(r.y > canvas.height){

            r.y = -20;
            r.x = Math.random()
                * canvas.width;
        }
    });

    requestAnimationFrame(
        animate
    );
}

animate();

</script>

</body>
</html>
