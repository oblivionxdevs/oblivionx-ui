<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OblivionX</title>

<style>
:root{
    --accent:#8C5AFF;
    --bg:#050507;
    --panel:#0c0c12;
    --panel2:#111118;
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --dim:#7b7b88;
}

*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family:Inter,sans-serif;
}

/* WEATHER */
#weather{
    position:fixed;
    inset:0;
    z-index:0;
    opacity:.35;
    pointer-events:none;
}

/* APP */
.app{
    position:relative;
    z-index:2;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(6px);
}

/* TABS */
.tabs{
    height:42px;
    background:rgba(10,10,14,.85);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    padding:0 10px;
    gap:6px;
}

.tab{
    height:28px;
    min-width:120px;
    padding:0 14px;
    border-radius:8px;
    background:transparent;
    border:1px solid transparent;
    display:flex;
    align-items:center;
    justify-content:space-between;
    color:var(--dim);
    font-size:12px;
    cursor:pointer;
}

.tab.active{
    background:var(--panel2);
    border-color:var(--border);
    color:white;
}

.tab:hover{
    background:#161620;
}

.tab-close{
    margin-left:10px;
    opacity:.5;
}

.tab-close:hover{
    opacity:1;
    color:#ff5555;
}

.add-tab{
    width:28px;
    height:28px;
    border:none;
    border-radius:8px;
    background:transparent;
    color:var(--dim);
    font-size:18px;
    cursor:pointer;
}

.add-tab:hover{
    background:#1a1a22;
    color:var(--accent);
}

/* EDITOR */
.editor{
    flex:1;
    position:relative;
}

#monaco{
    width:100%;
    height:100%;
}

/* COMMAND BAR */
.command-bar{
    height:48px;
    background:rgba(12,12,18,.95);
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    padding:0 18px;
    gap:12px;
}

.command-input{
    flex:1;
    height:36px;
    background:#0d0d12;
    border:1px solid var(--border);
    border-radius:10px;
    color:white;
    padding:0 14px;
    font-size:12px;
    outline:none;
}

.command-input:focus{
    border-color:var(--accent);
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#444;
    transition:.25s;
}

.status-dot.active{
    background:var(--accent);
    box-shadow:0 0 15px var(--accent);
}

/* SETTINGS */
.settings{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    backdrop-filter:blur(10px);
}

.settings-card{
    width:420px;
    background:#0c0c12;
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
}

.settings-title{
    font-size:14px;
    font-weight:700;
    margin-bottom:20px;
}

.setting{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
}

.setting span{
    font-size:12px;
}

select,input{
    background:#13131b;
    border:1px solid var(--border);
    color:white;
    border-radius:8px;
    padding:8px 10px;
}

/* BUTTONS */
.top-actions{
    position:absolute;
    top:10px;
    right:10px;
    z-index:10;
    display:flex;
    gap:8px;
}

.action-btn{
    height:32px;
    padding:0 14px;
    border:none;
    border-radius:8px;
    background:#12121a;
    border:1px solid var(--border);
    color:white;
    cursor:pointer;
}

.action-btn:hover{
    border-color:var(--accent);
}

/* NOTIFICATIONS */
.notifications{
    position:fixed;
    top:16px;
    right:16px;
    z-index:999;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.toast{
    min-width:260px;
    padding:14px;
    border-radius:12px;
    background:#101018;
    border:1px solid var(--border);
    animation:slide .3s ease;
    font-size:12px;
}

.toast.success{
    border-color:#3cff8f55;
}

.toast.error{
    border-color:#ff4d4d55;
}

@keyframes slide{
    from{
        transform:translateX(30px);
        opacity:0;
    }
    to{
        transform:translateX(0);
        opacity:1;
    }
}
</style>
</head>

<body>

<canvas id="weather"></canvas>

<div class="notifications" id="notifications"></div>

<div class="top-actions">
    <button class="action-btn" onclick="toggleSettings()">Settings</button>
    <button class="action-btn" onclick="inject()">Inject</button>
    <button class="action-btn" onclick="executeScript()">Execute</button>
</div>

<div class="app">

    <div class="tabs">
        <div id="tabs"></div>
        <button class="add-tab" onclick="newTab()">+</button>
    </div>

    <div class="editor">
        <div id="monaco"></div>
    </div>

    <div class="command-bar">
        <span style="color:var(--accent)">></span>

        <input
            class="command-input"
            id="command"
            placeholder="/inject /run /new /settings"
        >

        <div class="status-dot" id="injectDot"></div>
    </div>
</div>

<!-- SETTINGS -->
<div class="settings" id="settings">
    <div class="settings-card">

        <div class="settings-title">
            OblivionX Settings
        </div>

        <div class="setting">
            <span>Theme</span>

            <select id="themeSelect">
                <option value="#8C5AFF">Purple</option>
                <option value="#00D1FF">Ocean</option>
                <option value="#00FF88">Matrix</option>
                <option value="#FF4444">Vampire</option>
            </select>
        </div>

        <div class="setting">
            <span>Weather</span>

            <select id="weatherSelect">
                <option value="matrix">Matrix</option>
                <option value="rain">Rain</option>
                <option value="stars">Stars</option>
                <option value="snow">Snow</option>
            </select>
        </div>

        <div class="setting">
            <span>Discord RPC</span>

            <input type="checkbox" id="rpcEnabled">
        </div>

    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

<script>
let editor;
let currentFile = "main.lua";

let files = {
    "main.lua":"print('OblivionX Loaded')"
};

/* MONACO */
require.config({
    paths:{
        vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs"
    }
});

require(["vs/editor/editor.main"], function(){

    editor = monaco.editor.create(document.getElementById("monaco"),{
        value:files[currentFile],
        language:"lua",
        theme:"vs-dark",
        automaticLayout:true,
        minimap:{enabled:true},
        smoothScrolling:true,
        fontSize:14,
        fontFamily:"JetBrains Mono",
        cursorSmoothCaretAnimation:true,
        lineHeight:24,
        padding:{top:12}
    });

    renderTabs();
});

/* TABS */
function renderTabs(){

    const tabs = document.getElementById("tabs");
    tabs.innerHTML = "";

    Object.keys(files).forEach(file=>{

        const el = document.createElement("div");

        el.className = "tab " + (file===currentFile ? "active":"");

        el.innerHTML = `
            <span>${file}</span>
            <span class="tab-close">×</span>
        `;

        el.onclick = ()=>{
            save();
            currentFile = file;
            editor.setValue(files[file]);
            renderTabs();
        };

        el.querySelector(".tab-close").onclick=(e)=>{
            e.stopPropagation();

            if(Object.keys(files).length<=1) return;

            delete files[file];

            currentFile = Object.keys(files)[0];

            editor.setValue(files[currentFile]);

            renderTabs();
        };

        tabs.appendChild(el);
    });
}

function newTab(){

    save();

    const name = "script_" + (Object.keys(files).length+1) + ".lua";

    files[name] = "-- new script";

    currentFile = name;

    renderTabs();

    editor.setValue(files[name]);
}

function save(){

    if(editor){
        files[currentFile] = editor.getValue();
    }
}

/* EXECUTOR */
function inject(){

    window.chrome.webview.postMessage({
        action:"inject"
    });

    notify("Injection requested","success");
}

function executeScript(){

    window.chrome.webview.postMessage({
        action:"execute",
        code:editor.getValue()
    });

    notify("Script executed","success");
}

/* COMMANDS */
document.getElementById("command")
.addEventListener("keydown",e=>{

    if(e.key !== "Enter") return;

    const cmd = e.target.value.trim().toLowerCase();

    if(cmd === "/inject") inject();

    if(cmd === "/run") executeScript();

    if(cmd === "/new") newTab();

    if(cmd === "/settings") toggleSettings();

    e.target.value = "";
});

/* SETTINGS */
function toggleSettings(){

    const s = document.getElementById("settings");

    s.style.display =
        s.style.display === "flex"
        ? "none"
        : "flex";
}

/* NOTIFICATIONS */
function notify(text,type="success"){

    const container = document.getElementById("notifications");

    const toast = document.createElement("div");

    toast.className = "toast " + type;

    toast.textContent = text;

    container.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3500);
}

/* STATUS */
function setInjected(state){

    const dot = document.getElementById("injectDot");

    if(state){
        dot.classList.add("active");
    }else{
        dot.classList.remove("active");
    }
}

/* BACKEND EVENTS */
window.chrome.webview.addEventListener("message",event=>{

    const msg = event.data;

    if(msg.action === "pid_update"){
        setInjected(true);
    }

    if(msg.action === "clear_pid"){
        setInjected(false);
    }

    if(msg.action === "console"){
        notify(msg.message,msg.type);
    }
});

/* WEATHER */
const canvas = document.getElementById("weather");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener("resize",resize);

resize();

let particles = [];

function initWeather(){

    particles = [];

    for(let i=0;i<120;i++){

        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            speed:2+Math.random()*5
        });
    }
}

initWeather();

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#8C5AFF";

    particles.forEach(p=>{

        ctx.fillRect(p.x,p.y,2,10);

        p.y += p.speed;

        if(p.y > canvas.height){
            p.y = -20;
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
