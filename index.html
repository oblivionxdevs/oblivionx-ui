<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OblivionX Engine</title>

    <style>
        :root {
            --accent: #8C5AFF;
            --bg: #000000;
            --panel: #050505;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #666666;
            --tab-active: #111111;
            --modal-bg: rgba(10, 10, 12, 0.85);
        }

        .theme-purple   { --accent: #8C5AFF; --bg: #060608; --panel: #0b0b0e; }
        .theme-gold     { --accent: #FEE227; --bg: #080805; --panel: #0f0f0a; }
        .theme-vampire  { --accent: #FF3131; --bg: #080303; --panel: #120606; }
        .theme-ocean    { --accent: #00D1FF; --bg: #03070a; --panel: #060b12; }
        .theme-matrix   { --accent: #00FF41; --bg: #020502; --panel: #050a05; }

        * {
            box-sizing: border-box;
            transition: .2s;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text-main);
            font-family: Inter, sans-serif;
            overflow: hidden;
        }

        #weather-canvas {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: .35;
            pointer-events: none;
        }

        .app-shell {
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100vh;
            z-index: 2;
            backdrop-filter: blur(6px);
        }

        /* TOP BAR */

        .topbar {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: rgba(10,10,12,.85);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-logo {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .topbar-title {
            font-size: 12px;
            color: #ddd;
            font-weight: 600;
            letter-spacing: .5px;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .window-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #aaa;
            font-size: 12px;
        }

        .window-btn:hover {
            border-color: var(--accent);
            color: white;
        }

        /* HEADER */

        header {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
        }

        .logo {
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--text-dim);
        }

        .logo span {
            color: var(--accent);
        }

        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-dim);
            padding: 6px 12px;
            font-size: 11px;
            cursor: pointer;
        }

        .icon-btn:hover {
            border-color: var(--accent);
            color: white;
        }

        /* TABS */

        .tab-bar {
            height: 42px;
            background: var(--panel);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 4px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 6px 14px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-dim);
            border: 1px solid transparent;
        }

        .tab.active {
            color: white;
            background: var(--tab-active);
            border-color: var(--border);
        }

        .tab .close-x {
            margin-left: 8px;
            font-size: 14px;
            opacity: .3;
        }

        .tab .close-x:hover {
            opacity: 1;
            color: red;
        }

        .btn-add {
            background: transparent;
            border: none;
            color: #555;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-add:hover {
            color: var(--accent);
        }

        main {
            flex: 1;
            position: relative;
        }

        #monaco-root {
            width: 100%;
            height: 100%;
        }

        /* COMMAND BAR */

        .cli-bar {
            height: 46px;
            background: rgba(5,5,5,.9);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
        }

        .cli-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: JetBrains Mono;
            font-size: 12px;
        }

        .cli-input:focus {
            outline: none;
        }

        #status-glow {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
        }

        .status-active {
            background: var(--accent) !important;
            box-shadow: 0 0 12px var(--accent);
        }

        /* NOTIFICATIONS */

        #notifications {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
        }

        .toast {
            min-width: 240px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(15,15,18,.95);
            border: 1px solid var(--border);
            font-size: 12px;
            animation: slide .25s ease;
        }

        .toast.success {
            border-color: rgba(0,255,120,.3);
        }

        .toast.error {
            border-color: rgba(255,80,80,.3);
        }

        @keyframes slide {
            from {
                transform: translateX(30px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* MODALS */

        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,.7);
            backdrop-filter: blur(14px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .settings-card {
            width: 450px;
            padding: 24px;
            background: rgba(15,15,18,.95);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .form-select,
        .form-input {
            background: #09090b;
            color: #fff;
            border: 1px solid var(--border);
            padding: 8px 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body class="theme-purple">

<canvas id="weather-canvas"></canvas>

<div id="notifications"></div>

<div class="app-shell">

    <!-- TOP BAR -->

    <div class="topbar">

        <div class="topbar-left">
            <div class="topbar-logo"></div>
            <div class="topbar-title">
                OblivionX Executor
            </div>
        </div>

        <div class="window-controls">

            <div class="window-btn"
                 onclick="window.chrome.webview.postMessage({action:'minimize'})">
                —
            </div>

            <div class="window-btn"
                 onclick="window.chrome.webview.postMessage({action:'exit'})">
                ✕
            </div>

        </div>

    </div>

    <!-- HEADER -->

    <header>
        <div class="logo">
            OBLIVION<span>//</span>PRO
        </div>

        <button class="icon-btn"
                onclick="openModal('settings-modal')">
            Settings
        </button>
    </header>

    <!-- TABS -->

    <div class="tab-bar">
        <div id="tab-container"
             style="display:flex;gap:4px;"></div>

        <button class="btn-add"
                onclick="createNewTab()">
            +
        </button>
    </div>

    <!-- EDITOR -->

    <main>
        <div id="monaco-root"></div>
    </main>

    <!-- COMMAND BAR -->

    <div class="cli-bar">

        <span style="color:var(--accent);font-weight:bold;">
            >
        </span>

        <input type="text"
               id="cli"
               class="cli-input"
               placeholder="/inject /run /new /exit">

        <div id="status-glow"></div>

    </div>
</div>

<!-- SETTINGS -->

<div id="settings-modal"
     class="modal-overlay">

    <div class="settings-card">

        <h3 style="margin-top:0;">
            System Settings
        </h3>

        <div class="setting-row">
            <span>Theme</span>

            <select id="cfg-theme"
                    class="form-select"
                    onchange="applyGlobalTheme(this.value)">
                <option value="purple">Purple</option>
                <option value="gold">Gold</option>
                <option value="vampire">Vampire</option>
                <option value="ocean">Ocean</option>
                <option value="matrix">Matrix</option>
            </select>
        </div>

        <div class="setting-row">
            <span>Weather</span>

            <select id="cfg-weather"
                    class="form-select"
                    onchange="setWeatherEffect(this.value)">
                <option value="matrix">Matrix</option>
                <option value="rain">Rain</option>
                <option value="snow">Snow</option>
                <option value="stars">Stars</option>
                <option value="none">None</option>
            </select>
        </div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.min.js"></script>

<script>

let editor;

let currentFile = "main.lua";

let files = JSON.parse(localStorage.getItem("obv_fs")) || {
    "main.lua":"print('OblivionX Loaded')"
};

require.config({
    paths:{
        vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs"
    }
});

require(["vs/editor/editor.main"], function(){

    editor = monaco.editor.create(
        document.getElementById("monaco-root"),
        {
            value: files[currentFile],
            language: "lua",
            theme: "vs-dark",
            automaticLayout: true,
            minimap: { enabled: true },
            fontSize: 13,
            smoothScrolling: true,
            cursorSmoothCaretAnimation: true,
            fontFamily: "JetBrains Mono"
        }
    );

    renderTabs();
});

function save() {
    files[currentFile] = editor.getValue();

    localStorage.setItem(
        "obv_fs",
        JSON.stringify(files)
    );
}

function createNewTab(){

    save();

    const name =
        `script_${Object.keys(files).length+1}.lua`;

    files[name] =
        "-- New Script";

    currentFile = name;

    renderTabs();

    editor.setValue(files[name]);

    save();
}

function renderTabs(){

    const container =
        document.getElementById("tab-container");

    container.innerHTML = "";

    Object.keys(files).forEach(f=>{

        const tab =
            document.createElement("div");

        tab.className =
            `tab ${f===currentFile ? "active":""}`;

        tab.innerHTML = `
            <span>${f}</span>
            <span class="close-x">×</span>
        `;

        tab.onclick = ()=>{

            save();

            currentFile = f;

            editor.setValue(files[f]);

            renderTabs();
        };

        tab.querySelector(".close-x")
        .onclick = (e)=>{

            e.stopPropagation();

            if(Object.keys(files).length <= 1)
                return;

            delete files[f];

            currentFile =
                Object.keys(files)[0];

            editor.setValue(files[currentFile]);

            renderTabs();

            save();
        };

        container.appendChild(tab);
    });
}

/* NOTIFICATIONS */

function notify(text,type="success"){

    const holder =
        document.getElementById("notifications");

    const toast =
        document.createElement("div");

    toast.className =
        `toast ${type}`;

    toast.innerText = text;

    holder.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },3000);
}

/* SETTINGS */

function openModal(id){
    document.getElementById(id)
    .style.display = "flex";
}

function closeModal(id){
    document.getElementById(id)
    .style.display = "none";
}

/* THEMES */

function applyGlobalTheme(name){

    document.body.className =
        `theme-${name}`;

    localStorage.setItem(
        "obv_theme",
        name
    );

    window.chrome.webview.postMessage({
        action:"theme",
        value:name
    });
}

/* STATUS */

function updateStatusGlow(active){

    const glow =
        document.getElementById("status-glow");

    if(active){
        glow.classList.add("status-active");
    } else {
        glow.classList.remove("status-active");
    }
}

/* WEBVIEW EVENTS */

window.chrome.webview.addEventListener(
    "message",
    event=>{

        const msg = event.data;

        if(msg.action === "pid_update"){
            updateStatusGlow(true);
        }

        if(msg.action === "clear_pid"){
            updateStatusGlow(false);
        }

        if(msg.action === "console"){
            notify(msg.message,msg.type);
        }
    }
);

/* COMMAND BAR */

document.getElementById("cli")
.addEventListener("keydown",e=>{

    if(e.key !== "Enter")
        return;

    const cmd =
        e.target.value.toLowerCase().trim();

    if(cmd === "/inject"){

        window.chrome.webview.postMessage({
            action:"inject"
        });
    }

    if(cmd === "/run"){

        window.chrome.webview.postMessage({
            action:"execute",
            code:editor.getValue()
        });
    }

    if(cmd === "/new"){
        createNewTab();
    }

    if(cmd === "/exit"){

        window.chrome.webview.postMessage({
            action:"exit"
        });
    }

    e.target.value = "";
});

/* WEATHER */

const canvas =
    document.getElementById("weather-canvas");

const ctx =
    canvas.getContext("2d");

let particles = [];

function resizeCanvas(){

    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

window.addEventListener(
    "resize",
    resizeCanvas
);

resizeCanvas();

function initWeather(){

    particles = [];

    for(let i=0;i<120;i++){

        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            speed:2+Math.random()*5
        });
    }
}

function animateWeather(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle =
        getComputedStyle(document.body)
        .getPropertyValue("--accent");

    particles.forEach(p=>{

        ctx.fillRect(
            p.x,
            p.y,
            2,
            10
        );

        p.y += p.speed;

        if(p.y > canvas.height){
            p.y = -20;
        }
    });

    requestAnimationFrame(
        animateWeather
    );
}

function setWeatherEffect(mode){

    localStorage.setItem(
        "obv_weather",
        mode
    );

    notify(
        `Weather changed to ${mode}`,
        "success"
    );
}

initWeather();

animateWeather();

</script>

</body>
</html>
