<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OblivionX Engine</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:Inter, sans-serif;
    color:white;
}

#editor {
    width:100%;
    height:calc(100vh - 80px);
}

.topbar {
    height:40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    background:#111;
    -webkit-app-region: drag;
}

.controls {
    display:flex;
    gap:8px;
    -webkit-app-region:no-drag;
}

button {
    background:transparent;
    border:1px solid #333;
    color:white;
    width:30px;
    height:25px;
    cursor:pointer;
}

.tabs {
    height:30px;
    display:flex;
    gap:6px;
    background:#0b0b0b;
    align-items:center;
    padding:4px;
}

.tab {
    padding:4px 10px;
    font-size:12px;
    border:1px solid #222;
    cursor:pointer;
}

.tab.active {
    border-color:#8C5AFF;
}

.cli {
    height:40px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:#111;
}

.cli input {
    flex:1;
    background:transparent;
    border:none;
    color:white;
    outline:none;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div>OblivionX</div>
    <div class="controls">
        <button onclick="minimize()">—</button>
        <button onclick="closeApp()">✕</button>
    </div>
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- EDITOR -->
<div id="editor"></div>

<!-- CLI -->
<div class="cli">
    <input id="cli" placeholder="/run /inject /new /topmost">
</div>

<!-- WEATHER CANVAS (optional hook) -->
<canvas id="weather"></canvas>

<!-- MONACO LOADER (FIXED SAFE VERSION) -->
<script>
let editor;
let files = { "main.lua":"print('OblivionX')" };
let current = "main.lua";

/* =========================
   SAFE MONACO LOADER FIX
========================= */
function loadMonaco(callback){

    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.min.js";

    script.onload = () => {

        require.config({
            paths: {
                vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs"
            }
        });

        require(["vs/editor/editor.main"], function () {
            callback();
        });

    };

    document.body.appendChild(script);
}

/* =========================
   INIT EDITOR
========================= */
loadMonaco(() => {

    editor = monaco.editor.create(document.getElementById("editor"), {
        value: files[current],
        language: "lua",
        theme: "vs-dark",
        automaticLayout: true,
        minimap: { enabled: false }
    });

    renderTabs();
});

/* =========================
   TABS SYSTEM
========================= */
function renderTabs(){
    const t = document.getElementById("tabs");
    t.innerHTML = "";

    Object.keys(files).forEach(f => {
        let tab = document.createElement("div");
        tab.className = "tab" + (f === current ? " active" : "");
        tab.innerText = f;

        tab.onclick = () => {
            save();
            current = f;
            editor.setValue(files[f]);
            renderTabs();
        };

        t.appendChild(tab);
    });
}

function save(){
    if(editor){
        files[current] = editor.getValue();
    }
}

/* =========================
   CLI COMMANDS
========================= */
document.getElementById("cli").addEventListener("keydown", e => {
    if(e.key === "Enter"){
        let cmd = e.target.value.trim();

        if(cmd === "/run"){
            window.chrome?.webview.postMessage({
                action:"execute",
                code: editor.getValue()
            });
        }

        if(cmd === "/inject"){
            window.chrome?.webview.postMessage({ action:"inject" });
        }

        if(cmd === "/new"){
            let n = "script_" + Object.keys(files).length + ".lua";
            files[n] = "";
            current = n;
            renderTabs();
            editor.setValue("");
        }

        if(cmd === "/topmost"){
            toggleTopMost();
        }

        e.target.value = "";
    }
});

/* =========================
   TOPMOST FIX (REAL)
========================= */
let topmost = true;

function toggleTopMost(){
    topmost = !topmost;
    window.chrome?.webview.postMessage({
        action:"topmost",
        value: topmost
    });
}

/* =========================
   WINDOW CONTROLS
========================= */
function minimize(){
    window.chrome?.webview.postMessage({ action:"minimize" });
}

function closeApp(){
    window.chrome?.webview.postMessage({ action:"exit" });
}
</script>

</body>
</html>
